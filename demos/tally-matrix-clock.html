<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tally Matrix Clock - Interactive Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Demo Banner */
        .demo-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 122, 255, 0.9);
            color: white;
            text-align: center;
            padding: 8px 16px;
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .demo-banner a {
            color: white;
            font-weight: 600;
            text-decoration: underline;
        }

        /* Clock Container */
        .clock-container {
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 60px 0;
        }

        .colon-gap {
            width: 80px;
        }

        /* Matrix Grids */
        .matrix {
            display: grid;
            gap: 12px;
        }

        .matrix-1x3 {
            grid-template-columns: 1fr;
            grid-template-rows: repeat(3, 1fr);
        }

        .matrix-3x3 {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        /* Individual Squares */
        .square {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            transition: background-color 0.5s ease-in-out, opacity 0.5s ease-in-out;
        }

        .square.unlit {
            background-color: rgb(20, 20, 20);
        }

        .square.lit {
            opacity: 1;
        }

        /* Base-10 Display */
        .base10-display {
            font-size: 60px;
            font-weight: 100;
            color: rgba(255, 255, 255, 0.6);
            font-variant-numeric: tabular-nums;
            letter-spacing: 4px;
            margin-top: 20px;
            font-family: 'SF Mono', 'Menlo', monospace;
        }

        /* Settings Overlay */
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 500;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .settings-overlay.visible {
            display: flex;
        }

        .settings-title {
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 20px;
        }

        .settings-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .settings-label {
            font-size: 24px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
        }

        .settings-options {
            display: flex;
            gap: 16px;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .settings-btn.active {
            background: rgba(0, 122, 255, 0.6);
            border-color: rgba(0, 122, 255, 0.8);
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .toggle-btn.on {
            background: rgba(52, 199, 89, 0.6);
            border-color: rgba(52, 199, 89, 0.8);
        }

        .close-btn {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 12px;
            font-size: 28px;
            cursor: pointer;
            font-family: inherit;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Settings Gear */
        .settings-gear {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 32px;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .settings-gear:hover {
            opacity: 0.8;
        }

        /* PM Indicator Label */
        .pm-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            margin-top: 4px;
            height: 18px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .square { width: 50px; height: 50px; }
            .clock-container { gap: 20px; }
            .colon-gap { width: 40px; }
            .base10-display { font-size: 36px; }
        }

        @media (max-width: 600px) {
            .square { width: 35px; height: 35px; border-radius: 6px; }
            .clock-container { gap: 12px; }
            .colon-gap { width: 24px; }
            .base10-display { font-size: 28px; }
            .matrix { gap: 8px; }
        }
    </style>
</head>
<body>

    <div class="demo-banner">
        Interactive Demo — Tally Matrix Clock for Apple TV
        <a href="https://apps.apple.com/app/id6754099799" target="_blank">Download on the App Store</a>
    </div>

    <div class="clock-container" id="clockContainer">
        <!-- Matrix 0: Hours Tens (1x3) -->
        <div>
            <div class="matrix matrix-1x3" id="matrix0"></div>
            <div class="pm-label" id="pmLabel"></div>
        </div>

        <div style="width: 40px;"></div>

        <!-- Matrix 1: Hours Ones (3x3) -->
        <div class="matrix matrix-3x3" id="matrix1"></div>

        <!-- Colon Gap -->
        <div class="colon-gap"></div>

        <!-- Matrix 2: Minutes Tens (3x3) -->
        <div class="matrix matrix-3x3" id="matrix2"></div>

        <div style="width: 40px;"></div>

        <!-- Matrix 3: Minutes Ones (3x3) -->
        <div class="matrix matrix-3x3" id="matrix3"></div>
    </div>

    <div class="base10-display" id="base10Display"></div>

    <!-- Settings Gear -->
    <div class="settings-gear" id="settingsGear" title="Settings">⚙️</div>

    <!-- Settings Overlay -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-title">Settings</div>

        <div class="settings-section">
            <div class="settings-label">Color Scheme</div>
            <div class="settings-options" id="colorSchemeOptions">
                <button class="settings-btn active" data-scheme="randomRGB">Random RGB</button>
                <button class="settings-btn" data-scheme="matrixColors">Matrix Colors</button>
                <button class="settings-btn" data-scheme="singleColor">Single Color</button>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-label">Pattern Change Interval</div>
            <div class="settings-options" id="intervalOptions">
                <button class="settings-btn active" data-interval="5">5s</button>
                <button class="settings-btn" data-interval="15">15s</button>
                <button class="settings-btn" data-interval="30">30s</button>
                <button class="settings-btn" data-interval="60">60s</button>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-options">
                <button class="toggle-btn on" id="base10Toggle">Base-10 Display</button>
                <button class="toggle-btn" id="use24HourToggle">24-Hour Mode</button>
            </div>
        </div>

        <button class="close-btn" id="closeSettings">Close</button>

        <div style="margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; color: rgba(255, 255, 255, 0.5);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="rgba(255,255,255,0.5)"/>
                <path d="M9 8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S11.33 10 10.5 10 9 9.33 9 8.5zm3 0c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5-1.5-.67-1.5-1.5zM8 14h8c0 2.21-1.79 4-4 4s-4-1.79-4-4z" fill="rgba(255,255,255,0.5)"/>
            </svg>
            Engineered with Claude by Anthropic
        </div>
    </div>

    <!-- Easter egg moved to settings page -->

    <script>
        // =============================================
        // Tally Matrix Clock - HTML Demo
        // Fully functional recreation of the tvOS app
        // App Store: https://apps.apple.com/app/id6754099799
        // =============================================

        // Settings
        let colorScheme = 'randomRGB'; // randomRGB, matrixColors, singleColor
        let patternInterval = 5; // seconds
        let showBase10 = true;
        let use24Hour = false;

        // State
        let lastDigits = [-1, -1, -1, -1];
        let lastPatternChange = Date.now();
        let patterns = [[], [], [], []];
        let colors = [[], [], [], []];
        const baseColors = ['#FF3B30', '#34C759', '#007AFF']; // Red, Green, Blue

        // Initialize matrices
        function initMatrices() {
            // Matrix 0: 1x3
            const m0 = document.getElementById('matrix0');
            m0.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const sq = document.createElement('div');
                sq.className = 'square unlit';
                sq.id = `m0s${i}`;
                m0.appendChild(sq);
            }

            // Matrices 1-3: 3x3
            for (let m = 1; m <= 3; m++) {
                const el = document.getElementById(`matrix${m}`);
                el.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const sq = document.createElement('div');
                    sq.className = 'square unlit';
                    sq.id = `m${m}s${i}`;
                    el.appendChild(sq);
                }
            }
        }

        // Generate random pattern (which squares to light)
        function generatePattern(count, total) {
            const indices = Array.from({ length: total }, (_, i) => i);
            // Shuffle
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            return indices.slice(0, count);
        }

        // Generate colors for a matrix
        function generateColors(matrixIndex, total) {
            const cols = [];
            if (colorScheme === 'randomRGB') {
                for (let i = 0; i < total; i++) {
                    cols.push(baseColors[Math.floor(Math.random() * baseColors.length)]);
                }
            } else if (colorScheme === 'matrixColors') {
                const color = baseColors[Math.floor(Math.random() * baseColors.length)];
                for (let i = 0; i < total; i++) {
                    cols.push(color);
                }
            } else { // singleColor
                const color = baseColors[Math.floor(Math.random() * baseColors.length)];
                for (let i = 0; i < total; i++) {
                    cols.push(color);
                }
            }
            return cols;
        }

        // For single color mode, pick one color for all matrices
        let globalSingleColor = baseColors[0];

        function updatePatterns() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const isPM = hours >= 12;

            if (!use24Hour) {
                hours = hours % 12;
                if (hours === 0) hours = 12;
            }

            const digits = [
                Math.floor(hours / 10),  // Hours tens
                hours % 10,              // Hours ones
                Math.floor(minutes / 10), // Minutes tens
                minutes % 10             // Minutes ones
            ];

            const totals = [3, 9, 9, 9];
            const digitsChanged = digits.some((d, i) => d !== lastDigits[i]);
            const elapsed = (Date.now() - lastPatternChange) / 1000;

            if (digitsChanged || elapsed >= patternInterval) {
                // Pick global single color if needed
                if (colorScheme === 'singleColor') {
                    globalSingleColor = baseColors[Math.floor(Math.random() * baseColors.length)];
                }

                for (let m = 0; m < 4; m++) {
                    let count = digits[m];

                    // 12hr mode: hours tens matrix uses only top 2 cells
                    if (m === 0 && !use24Hour) {
                        // Only positions 0 and 1 available for counting
                        patterns[m] = generatePattern(count, 2); // Only picks from 0-1
                    } else {
                        patterns[m] = generatePattern(count, totals[m]);
                    }

                    if (colorScheme === 'singleColor') {
                        colors[m] = Array(totals[m]).fill(globalSingleColor);
                    } else {
                        colors[m] = generateColors(m, totals[m]);
                    }
                }

                lastDigits = [...digits];
                lastPatternChange = Date.now();
            }

            // Render Matrix 0 (1x3 - Hours Tens)
            for (let i = 0; i < 3; i++) {
                const sq = document.getElementById(`m0s${i}`);
                if (!use24Hour && i === 2) {
                    // PM indicator
                    if (isPM) {
                        sq.className = 'square lit';
                        sq.style.backgroundColor = colors[0][i] || baseColors[0];
                    } else {
                        sq.className = 'square unlit';
                        sq.style.backgroundColor = '';
                    }
                } else {
                    if (patterns[0].includes(i)) {
                        sq.className = 'square lit';
                        sq.style.backgroundColor = colors[0][i] || baseColors[0];
                    } else {
                        sq.className = 'square unlit';
                        sq.style.backgroundColor = '';
                    }
                }
            }

            // PM Label
            const pmLabel = document.getElementById('pmLabel');
            if (!use24Hour) {
                pmLabel.textContent = isPM ? 'PM' : 'AM';
                pmLabel.style.color = isPM ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
            } else {
                pmLabel.textContent = '';
            }

            // Render Matrices 1-3 (3x3)
            for (let m = 1; m <= 3; m++) {
                for (let i = 0; i < 9; i++) {
                    const sq = document.getElementById(`m${m}s${i}`);
                    if (patterns[m].includes(i)) {
                        sq.className = 'square lit';
                        sq.style.backgroundColor = colors[m][i] || baseColors[0];
                    } else {
                        sq.className = 'square unlit';
                        sq.style.backgroundColor = '';
                    }
                }
            }

            // Base-10 display
            const base10 = document.getElementById('base10Display');
            if (showBase10) {
                const now2 = new Date();
                let h = now2.getHours();
                const min = String(now2.getMinutes()).padStart(2, '0');
                if (use24Hour) {
                    base10.textContent = `${String(h).padStart(2, '0')}:${min}`;
                } else {
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    h = h % 12;
                    if (h === 0) h = 12;
                    base10.textContent = `${h}:${min} ${ampm}`;
                }
                base10.style.display = '';
            } else {
                base10.style.display = 'none';
            }
        }

        // Settings UI
        function setupSettings() {
            document.getElementById('settingsGear').addEventListener('click', () => {
                document.getElementById('settingsOverlay').classList.add('visible');
            });

            document.getElementById('closeSettings').addEventListener('click', () => {
                document.getElementById('settingsOverlay').classList.remove('visible');
                // Reset patterns on close like the real app
                lastDigits = [-1, -1, -1, -1];
                lastPatternChange = 0;
                updatePatterns();
            });

            // Color scheme buttons
            document.querySelectorAll('#colorSchemeOptions .settings-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#colorSchemeOptions .settings-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    colorScheme = btn.dataset.scheme;
                    lastDigits = [-1, -1, -1, -1];
                    lastPatternChange = 0;
                });
            });

            // Interval buttons
            document.querySelectorAll('#intervalOptions .settings-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#intervalOptions .settings-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    patternInterval = parseInt(btn.dataset.interval);
                    lastPatternChange = Date.now();
                });
            });

            // Toggle buttons
            document.getElementById('base10Toggle').addEventListener('click', function() {
                showBase10 = !showBase10;
                this.classList.toggle('on');
            });

            document.getElementById('use24HourToggle').addEventListener('click', function() {
                use24Hour = !use24Hour;
                this.classList.toggle('on');
                lastDigits = [-1, -1, -1, -1];
                lastPatternChange = 0;
            });
        }

        // Initialize
        initMatrices();
        setupSettings();
        updatePatterns();

        // Main loop - check every 500ms
        setInterval(updatePatterns, 500);
    </script>
</body>
</html>
